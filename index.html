<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanzas Pro — Dashboard Financiero</title>
  <meta name="theme-color" content="#0A84FF">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="offline-banner" id="offlineBanner">
  <span id="offlineIcon">📴</span>
  <span id="offlineText">Sin internet — cambios guardados localmente</span>
</div>

<div id="loginOverlay">
  <div class="login-card">
    <div class="login-logo">💼</div>
    <div class="login-title">Finanzas Pro</div>
    <div class="login-sub">Tu dashboard financiero personal.<br>Inicia sesión con tu cuenta de Google para continuar.</div>
    <button class="btn-google" id="btnGoogleLogin">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar con Google
    </button>
    <div class="login-error" id="loginError"></div>
    <div class="login-lock">🔒 Solo el propietario autorizado puede acceder</div>
  </div>
</div>

<div id="accessDenied">
  <div class="denied-card">
    <div style="font-size:52px;margin-bottom:12px">🚫</div>
    <div style="font-size:22px;font-weight:800;letter-spacing:-0.02em;margin-bottom:8px">Acceso denegado</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.5">Esta aplicación es privada.<br>Tu cuenta no tiene permiso de acceso.</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:24px;word-break:break-all" id="deniedEmail"></div>
    <button class="btn btn-secondary" onclick="window.signOutUser()">← Cerrar sesión</button>
  </div>
</div>

<nav class="nav" id="mainNav" style="display:none">
  <div class="nav-inner">
    <div style="display:flex;align-items:center;gap:12px;margin-right:16px;flex-shrink:0">
      <div class="nav-logo" onclick="switchTab('dashboard')" style="margin-right:0">💼</div>
      <div id="navPatrimonio" style="line-height:1">
        <div class="nav-big" style="font-size:20px;font-weight:800;letter-spacing:-0.03em" id="navTotal">$0</div>
        <div style="font-size:10px;color:var(--text2);display:flex;gap:8px;margin-top:1px" id="navSub"></div>
      </div>
    </div>
    <div class="nav-tabs" id="navTabs">
      <button class="nav-tab active" data-tab="dashboard">📊 Dashboard</button>
      <button class="nav-tab" data-tab="movimientos">📋 Movimientos</button>
      <button class="nav-tab" data-tab="plataformas">🏦 Plataformas</button>
      <button class="nav-tab" data-tab="gastos">💳 Gastos</button>
      <button class="nav-tab" data-tab="metas">🎯 Metas</button>
      <button class="nav-tab" data-tab="ajustes">⚙️ Ajustes</button>
    </div>
    <div class="nav-user" id="navUser">
      <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Modo oscuro">
        <span class="dark-toggle-icon dark-toggle-moon">🌙</span>
        <span class="dark-toggle-icon dark-toggle-sun">☀️</span>
      </button>
    </div>
  </div>
</nav>

<nav class="mobile-nav" id="mobileNav" style="display:none">
  <button class="mobile-nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="mob-icon">📊</span><span class="mob-label">Dashboard</span></button>
  <button class="mobile-nav-item" data-tab="movimientos" onclick="switchTab('movimientos')"><span class="mob-icon">📋</span><span class="mob-label">Movimientos</span></button>
  <button class="mobile-nav-item" data-tab="plataformas" onclick="switchTab('plataformas')"><span class="mob-icon">🏦</span><span class="mob-label">Plataformas</span></button>
  <button class="mobile-nav-item" data-tab="gastos" onclick="switchTab('gastos')"><span class="mob-icon">💳</span><span class="mob-label">Gastos</span></button>
  <button class="mobile-nav-item" data-tab="metas" onclick="switchTab('metas')"><span class="mob-icon">🎯</span><span class="mob-label">Metas</span></button>
  <button class="mobile-nav-item" data-tab="ajustes" onclick="switchTab('ajustes')"><span class="mob-icon">⚙️</span><span class="mob-label">Ajustes</span></button>
</nav>

<div class="container" id="mainContainer" style="display:none">
  <div class="page active" id="page-dashboard"></div>
  <div class="page" id="page-movimientos"></div>
  <div class="page" id="page-plataformas"></div>
  <div class="page" id="page-gastos"></div>
  <div class="page" id="page-metas"></div>
  <div class="page" id="page-ajustes"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal wide" id="modalContent"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
