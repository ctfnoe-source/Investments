<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanzas Pro V5 — Dashboard Elite</title>
  <meta name="theme-color" content="#0071e3">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="offline-banner" id="offlineBanner">
  <span id="offlineIcon">📴</span> <span id="offlineText">Modo Offline activo</span>
</div>

<div id="loginOverlay">
  <div class="login-card">
    <div class="login-logo">💎</div>
    <div class="login-title">Finanzas Pro <span style="font-size: 12px; vertical-align: middle; opacity: 0.6;">V5</span></div>
    <div class="login-sub">Gestión patrimonial de alto nivel.<br>Acceso restringido con Google Auth.</div>
    <button class="btn-google" id="btnGoogleLogin">
      <svg viewBox="0 0 24 24" style="width:20px"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Entrar con Google
    </button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<nav class="nav" id="mainNav" style="display:none">
  <div class="nav-inner">
    <div class="nav-left">
      <div class="nav-logo" onclick="switchTab('dashboard')">💼</div>
      <div id="navPatrimonio">
        <div class="nav-big" id="navTotal">$0</div>
        <div class="nav-sub-info" id="navSub"></div>
      </div>
    </div>
    <div class="nav-tabs" id="navTabs">
      <button class="nav-tab active" data-tab="dashboard">📊 Dashboard</button>
      <button class="nav-tab" data-tab="movimientos">📋 Movs</button>
      <button class="nav-tab" data-tab="plataformas">🏦 Bancos</button>
      <button class="nav-tab" data-tab="gastos">💳 Gastos</button>
      <button class="nav-tab" data-tab="metas">🎯 Metas</button>
      <button class="nav-tab" data-tab="ajustes">⚙️ Ajustes</button>
    </div>
    <div class="nav-user" id="navUser"></div>
  </div>
</nav>

<nav class="mobile-nav" id="mobileNav" style="display:none">
  <button class="mobile-nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')"><span>📊</span><label>Dash</label></button>
  <button class="mobile-nav-item" data-tab="plataformas" onclick="switchTab('plataformas')"><span>🏦</span><label>Bancos</label></button>
  <button class="mobile-nav-item" data-tab="gastos" onclick="switchTab('gastos')"><span>💳</span><label>Gastos</label></button>
  <button class="mobile-nav-item" data-tab="ajustes" onclick="switchTab('ajustes')"><span>⚙️</span><label>Ajustes</label></button>
</nav>

<div class="container" id="mainContainer" style="display:none">
  <div class="page active" id="page-dashboard"></div>
  <div class="page" id="page-movimientos"></div>
  <div class="page" id="page-plataformas"></div>
  <div class="page" id="page-gastos"></div>
  <div class="page" id="page-metas"></div>
  <div class="page" id="page-ajustes"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal wide" id="modalContent"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
